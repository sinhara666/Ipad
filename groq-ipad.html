<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Groq Chat - iPad Ready</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0a2e 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 1.3em;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .settings-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.95em;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: #fff;
        }
        
        .message.ai .message-content {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd;
        }
        
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            flex-shrink: 0;
            margin-top: 4px;
        }
        
        .user-avatar {
            background: linear-gradient(135deg, #ff006e, #8338ec);
        }
        
        .ai-avatar {
            background: rgba(51, 56, 236, 0.3);
            border: 1px solid rgba(51, 56, 236, 0.5);
        }
        
        .loading {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: bounce 1.4s infinite;
        }
        
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
            }
            40% {
                opacity: 1;
            }
        }
        
        .input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
            font-size: 0.95em;
            resize: none;
            max-height: 100px;
            min-height: 44px;
        }
        
        textarea:focus {
            outline: none;
            border-color: rgba(255, 0, 110, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }
        
        textarea::placeholder {
            color: #666;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            min-width: 50px;
            transition: opacity 0.2s;
        }
        
        .send-btn:active {
            opacity: 0.8;
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-close {
            float: right;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
        }
        
        .modal-close:active {
            color: #fff;
        }
        
        .modal h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #ff006e;
            clear: both;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
            font-size: 0.95em;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(255, 0, 110, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .form-group input::placeholder {
            color: #666;
        }
        
        .save-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
        }
        
        .save-btn:active {
            opacity: 0.9;
        }
        
        .info-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 10px;
            line-height: 1.4;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            header {
                padding: 12px 15px;
            }
            
            h1 {
                font-size: 1.1em;
            }
            
            .chat-container {
                padding: 15px;
                gap: 10px;
            }
            
            .message-content {
                max-width: 90%;
                padding: 10px 14px;
                font-size: 0.9em;
            }
            
            .input-area {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 Groq Chat</h1>
        <button class="settings-btn" onclick="openSettings()">⚙️ Settings</button>
    </header>
    
    <div class="chat-container" id="chatContainer"></div>
    
    <div class="input-area">
        <textarea id="messageInput" placeholder="Ask me anything..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeSettings()">&times;</button>
            <h2>Settings</h2>
            
            <div id="apiKeyError" class="error" style="display: none;"></div>
            
            <div class="form-group">
                <label for="apiKey">Groq API Key</label>
                <input type="password" id="apiKey" placeholder="gsk_..." />
                <p class="info-text">Get free key at <a href="https://console.groq.com" target="_blank" style="color: #3b82f6;">console.groq.com</a></p>
            </div>
            
            <div class="form-group">
                <label for="modelSelect">Model</label>
                <select id="modelSelect">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Best)</option>
                    <option value="llama-3.1-70b-versatile">Llama 3.1 70B</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                    <option value="gemma-7b-it">Gemma 7B</option>
                </select>
            </div>
            
            <button class="save-btn" onclick="saveSettings()">Save Settings</button>
            
            <p class="info-text" style="margin-top: 20px;">Your API key is stored locally in your browser only. Never shared.</p>
        </div>
    </div>
    
    <script>
        let apiKey = localStorage.getItem('groq_api_key') || '';
        let selectedModel = localStorage.getItem('groq_model') || 'llama-3.3-70b-versatile';
        
        // Load saved settings
        if (apiKey) {
            document.getElementById('apiKey').value = apiKey;
        }
        document.getElementById('modelSelect').value = selectedModel;
        
        // Auto-resize textarea
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Enter to send (Cmd+Enter on mobile)
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        function saveSettings() {
            const newApiKey = document.getElementById('apiKey').value.trim();
            const newModel = document.getElementById('modelSelect').value;
            
            if (!newApiKey) {
                showError('API key required');
                return;
            }
            
            apiKey = newApiKey;
            selectedModel = newModel;
            
            localStorage.setItem('groq_api_key', apiKey);
            localStorage.setItem('groq_model', selectedModel);
            
            closeSettings();
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('apiKeyError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            if (!apiKey) {
                showError('Set your Groq API key in settings first');
                openSettings();
                return;
            }
            
            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            // Show loading
            showLoading();
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: getConversationHistory(),
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || 'API error');
                }
                
                const aiMessage = data.choices[0].message.content;
                removeLoading();
                addMessage(aiMessage, 'ai');
                
            } catch (error) {
                removeLoading();
                addMessage('❌ Error: ' + error.message, 'ai');
            }
            
            // Focus back on input
            input.focus();
        }
        
        function addMessage(text, role) {
            const container = document.getElementById('chatContainer');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}-avatar`;
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            if (role === 'user') {
                messageDiv.appendChild(content);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(content);
            }
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function getConversationHistory() {
            const messages = [];
            document.querySelectorAll('.message').forEach(msg => {
                const role = msg.classList.contains('user') ? 'user' : 'assistant';
                const text = msg.querySelector('.message-content').textContent;
                messages.push({ role, content: text });
            });
            return messages;
        }
        
        function showLoading() {
            const container = document.getElementById('chatContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = `
                <div class="avatar ai-avatar">🤖</div>
                <div class="loading">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }
        
        // Welcome message
        window.addEventListener('load', () => {
            if (!localStorage.getItem('groq_chat_welcomed')) {
                addMessage('Hi! 👋 I\'m powered by Groq AI running on your iPad. Add your API key in Settings to get started.', 'ai');
                localStorage.setItem('groq_chat_welcomed', 'true');
            }
        });
    </script>
</body>
</html>
